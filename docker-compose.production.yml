services:
  db:
    image: mysql:8.0
    restart: always
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABSE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      - "3306"
    volumes:
      - db_data_cloud:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb/init.sql

  app:
    build: .
    restart: always
    env_file: .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - db

volumes:
  db_data_cloud:
